<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Favorite Bhai ❤️</title>

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <div class="container">

        <div class="profile-pics">

            <img id="bhai-pic"
                src="bhai_profile.jpg.jpg">

            <img id="deeksha-pic"
                src="deeksha_profile.jpg.jpg">

        </div>

        <h1 id="question">

            Oye Deeksha 😇

            <br><br>

            Kya main tera favorite bhai hoon?

        </h1>

        <p id="sub-text">

            Sach sach bolna 😎

        </p>

        <div class="btn-group">

            <button id="yes-btn">

                Yes Obviously 💚

            </button>

            <button id="no-btn">

                Bilkul Nahi 🤢

            </button>

        </div>

        <div id="celebration-box"
            class="hidden">

            <h2>

                YAYYYYY 😭❤️

            </h2>

            <p>

                Mujhe pata tha 😎

                <br><br>

                Officially:

                <br>

                <b>
                    Anant = Favorite Bhai 🏆
                </b>

            </p>

            <div class="celebration">

                🎉✨💖🌸🥳🫶🔥

            </div>

            <br>

            <h3>

                Ab treat choose karo 😌

            </h3>

            <select id="treat-choice">

                <option value="Pizza Party 🍕">

                    Pizza Party 🍕

                </option>

                <option value="Chocolate Box 🍫">

                    Chocolate Box 🍫

                </option>

                <option value="1000 Rupees Cash 💸">

                    ₹1000 Cash 💸

                </option>

                <option value="Ice Cream Treat 🍨">

                    Ice Cream 🍨

                </option>

            </select>

            <br><br>

            <button id="confirm-btn">

                Confirm Treat 😎

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
